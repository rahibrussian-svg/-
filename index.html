<!DOCTYPE html>
<html>
<head>
<title>Проверка документа</title>
</head>
<body>

<input type="text" id="docNumber" placeholder="Введите номер документа">
<button onclick="showResult()">Проверить</button>

<div id="resultBox" style="display:none;"></div>

<script>
function showResult() {
    const number = document.getElementById("docNumber").value;
    const resultBox = document.getElementById("resultBox");

    if(number === "C05365646") {
        resultBox.style.display = "block";
        resultBox.innerHTML = `
            <p><strong>ФИО:</strong> Маммадли Рахиб Шахаддин оглы</p>
            <p><strong>Предмет:</strong> Русский язык</p>
            <p><strong>Итоговая оценка:</strong> 4</p>
        `;
    } else {
        resultBox.style.display = "block";
        resultBox.innerHTML = "Документ не найден";
    }
}
</script>

</body>
</html>
